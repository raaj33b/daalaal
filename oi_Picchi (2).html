<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>oi_Picchi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:80px;height:120px;
  background:transparent;
  overflow:hidden;
}

/* MAIN WIDGET — floats at bottom */
#picchi{
  position:fixed;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:72px;
  animation:appear-fade 13s ease-in-out infinite;
  cursor:pointer;
}
@keyframes appear-fade{
  0%{opacity:0;transform:translateX(-50%) scale(0.3) translateY(30px);}
  6%{opacity:1;transform:translateX(-50%) scale(1.08) translateY(0);}
  9%{transform:translateX(-50%) scale(1) translateY(0);}
  85%{opacity:1;transform:translateX(-50%) scale(1) translateY(0);}
  90%{opacity:1;transform:translateX(-50%) scale(1.05) rotate(3deg);}
  98%{opacity:0;transform:translateX(-50%) scale(0.2) translateY(40px) rotate(-15deg);}
  100%{opacity:0;transform:translateX(-50%) scale(0.2) translateY(40px);}
}

/* SPEECH BUBBLE */
#bubble{
  position:absolute;
  bottom:108px;left:50%;transform:translateX(-50%);
  background:#fff;
  border:1.5px solid #000080;
  border-radius:8px;
  padding:3px 7px;
  font-family:'Segoe UI',sans-serif;
  font-size:9px;font-weight:700;
  color:#000080;
  white-space:nowrap;
  box-shadow:1px 1px 0 #aaa;
  animation:bubble-cycle 13s steps(1) infinite;
  pointer-events:none;
}
#bubble::after{
  content:'';position:absolute;
  bottom:-6px;left:50%;transform:translateX(-50%);
  border:3px solid transparent;
  border-top:4px solid #000080;
}
@keyframes bubble-cycle{
  0%{content:'';opacity:1;}
  7%{opacity:1;}8%{opacity:0;}
  22%{opacity:0;}23%{opacity:1;}30%{opacity:1;}31%{opacity:0;}
  45%{opacity:0;}46%{opacity:1;}53%{opacity:1;}54%{opacity:0;}
  68%{opacity:0;}69%{opacity:1;}76%{opacity:1;}77%{opacity:0;}
  91%{opacity:0;}92%{opacity:1;}99%{opacity:1;}100%{opacity:0;}
}

/* CHARACTER BODY — no background, transparent */
.char{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  animation:bounce-char 0.38s ease-in-out infinite alternate;
}
@keyframes bounce-char{
  from{transform:translateY(0);}
  to{transform:translateY(-7px);}
}

/* HAIR */
.hair{
  width:40px;height:18px;
  background:linear-gradient(180deg,#1a0030,#3d0060);
  border-radius:50% 50% 0 0;
  position:relative;
}
.hair-bangs{
  position:absolute;bottom:-2px;left:-3px;right:-3px;height:10px;
  background:#2d0050;border-radius:0 0 8px 8px;
}
.hair-l,.hair-r{
  position:absolute;width:7px;height:28px;
  background:#2d0050;border-radius:3px;bottom:-25px;
}
.hair-l{left:-5px;transform:rotate(-4deg);}
.hair-r{right:-5px;transform:rotate(4deg);}
.bow{
  position:absolute;top:-7px;right:-3px;
}
.bow-l,.bow-r{
  display:inline-block;width:7px;height:6px;
  background:#ff2d78;border-radius:50%;
  animation:bow-bounce 0.38s ease-in-out infinite alternate;
}
.bow-l{transform:rotate(-30deg);}
.bow-r{transform:rotate(30deg);}
@keyframes bow-bounce{from{transform:scale(1)rotate(-30deg);}to{transform:scale(1.15)rotate(-20deg);}}
.bow-c{width:4px;height:4px;background:#ff2d78;border-radius:50%;display:inline-block;vertical-align:middle;}

/* FACE */
.face{
  width:30px;height:26px;
  background:linear-gradient(180deg,#ffcc99,#ffaa77);
  border-radius:48% 48% 44% 44%;
  position:relative;
  margin-top:-2px;
  animation:face-tilt 0.38s ease-in-out infinite alternate;
}
@keyframes face-tilt{from{transform:rotate(-3deg);}to{transform:rotate(3deg);}}
.eye{
  position:absolute;width:5px;height:6px;
  background:#1a0030;border-radius:50% 50% 38% 38%;top:8px;
}
.eye::after{content:'';position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;top:1px;left:1px;}
.el{left:5px;animation:wink 2.4s ease-in-out infinite;}
@keyframes wink{0%,80%,100%{height:6px;}84%,88%{height:2px;}}
.er{right:5px;}
.blush{position:absolute;width:7px;height:4px;background:rgba(255,100,120,.45);border-radius:50%;top:13px;}
.bl{left:1px;}.br{right:1px;}
.mouth{
  position:absolute;width:9px;height:5px;
  border-bottom:2px solid #cc4466;
  border-radius:0 0 6px 6px;
  bottom:4px;left:50%;transform:translateX(-50%);
  animation:mouth-move 0.38s ease-in-out infinite alternate;
}
@keyframes mouth-move{from{height:3px;}to{height:6px;}}

/* BODY */
.body{
  width:26px;height:28px;
  background:linear-gradient(180deg,#ff2d78,#cc0055);
  border-radius:4px 4px 2px 2px;
  position:relative;
  animation:body-sway 0.38s ease-in-out infinite alternate;
}
@keyframes body-sway{from{transform:rotate(-5deg);}to{transform:rotate(5deg);}}
.collar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:9px;height:7px;background:#ff80ab;border-radius:0 0 50% 50%;}
.star{position:absolute;top:7px;right:2px;font-size:8px;animation:star-spin 1s linear infinite;}
@keyframes star-spin{to{transform:rotate(360deg);}}
/* ARMS */
.arm-l,.arm-r{
  position:absolute;width:8px;height:18px;
  background:#ffcc99;border-radius:3px;top:2px;
}
.arm-l{left:-9px;transform-origin:top right;animation:al 0.38s ease-in-out infinite alternate;}
.arm-r{right:-9px;transform-origin:top left;animation:ar 0.38s ease-in-out infinite alternate;}
@keyframes al{from{transform:rotate(-45deg);}to{transform:rotate(25deg);}}
@keyframes ar{from{transform:rotate(45deg);}to{transform:rotate(-25deg);}}

/* LEGS */
.legs{display:flex;gap:3px;justify-content:center;margin-top:1px;}
.leg-wrap{display:flex;flex-direction:column;align-items:center;}
.leg{width:8px;height:20px;background:linear-gradient(180deg,#cc0055,#880033);border-radius:2px;}
.ll{animation:ll-kick 0.38s ease-in-out infinite alternate;}
.lr{animation:lr-kick 0.38s ease-in-out infinite alternate;}
@keyframes ll-kick{from{transform:rotate(-18deg);}to{transform:rotate(12deg);}}
@keyframes lr-kick{from{transform:rotate(12deg);}to{transform:rotate(-18deg);}}
.shoe{width:12px;height:6px;background:#1a0030;border-radius:2px 5px 5px 2px;margin-top:1px;}
.shoe-r{border-radius:5px 2px 2px 5px;}

/* CLOCK BAR at very bottom */
#clk-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:16px;
  background:linear-gradient(90deg,#000080,#1a5fcc);
  display:flex;align-items:center;justify-content:center;
  border-top:1px solid #4488ff;
}
#clk{
  font-family:'Courier New',monospace;
  font-size:9px;color:#fff;letter-spacing:1px;
  font-weight:bold;
}

/* SPARKLES */
.sp{
  position:fixed;font-size:10px;pointer-events:none;
  animation:sp-fly var(--d,1.2s) ease-in-out var(--dl,0s) infinite;
}
@keyframes sp-fly{
  0%{opacity:0;transform:translate(0,0) scale(0);}
  40%{opacity:1;transform:translate(var(--x,8px),var(--y,-20px)) scale(1);}
  100%{opacity:0;transform:translate(var(--x2,15px),var(--y2,-40px)) scale(0);}
}
</style>
</head>
<body>

<!-- SPARKLES -->
<div class="sp" style="bottom:90px;left:5px;--d:1.1s;--dl:0s;--x:8px;--y:-18px;--x2:12px;--y2:-35px;">✨</div>
<div class="sp" style="bottom:80px;right:5px;--d:0.9s;--dl:0.3s;--x:-8px;--y:-14px;--x2:-14px;--y2:-28px;">⭐</div>
<div class="sp" style="bottom:100px;left:15px;--d:1.4s;--dl:0.6s;--x:6px;--y:-22px;--x2:10px;--y2:-38px;">💫</div>

<!-- PICCHI WIDGET -->
<div id="picchi">
  <!-- SPEECH BUBBLE -->
  <div id="bubble" id="btext">ভাই কিরে! 👀</div>

  <!-- CHARACTER -->
  <div class="char">
    <!-- HAIR + BOW -->
    <div style="position:relative;width:46px;display:flex;justify-content:center;">
      <div class="hair">
        <div class="hair-bangs"></div>
        <div class="hair-l"></div>
        <div class="hair-r"></div>
        <div class="bow">
          <span class="bow-l"></span><span class="bow-c"></span><span class="bow-r"></span>
        </div>
      </div>
    </div>
    <!-- FACE -->
    <div class="face" style="margin-top:-2px;">
      <div class="eye el"></div>
      <div class="eye er"></div>
      <div class="blush bl"></div>
      <div class="blush br"></div>
      <div class="mouth"></div>
    </div>
    <!-- BODY -->
    <div class="body" style="margin-top:0px;">
      <div class="collar"></div>
      <div class="star">⭐</div>
      <div class="arm-l"></div>
      <div class="arm-r"></div>
    </div>
    <!-- LEGS -->
    <div class="legs">
      <div class="leg-wrap">
        <div class="leg ll"></div>
        <div class="shoe"></div>
      </div>
      <div class="leg-wrap">
        <div class="leg lr"></div>
        <div class="shoe shoe-r"></div>
      </div>
    </div>
  </div>
</div>

<!-- CLOCK BAR -->
<div id="clk-bar">
  <span id="clk">00:00:00</span>
</div>

<script>
// Clock
setInterval(()=>{
  const n=new Date();
  document.getElementById('clk').textContent=
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
},1000);

// Cycling speech bubble text
const msgs=['ভাই কিরে! 👀','আমি Picchi ✨','no cap 💅','∴ ১৩ ✦','byeee! 💨'];
let mi=0;
const bbl=document.getElementById('bubble');
setInterval(()=>{mi=(mi+1)%msgs.length;bbl.textContent=msgs[mi];},2600);
</script>
</body>
</html>
